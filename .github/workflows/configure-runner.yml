name: Create Selfhosted Runner

on:
  workflow_dispatch:
    inputs:
      RUNNER_TOKEN:
        description: 'This is the runner token, not PAT'
        required: true

jobs:
  setup-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Full Runner Setup
        run: |
          # 1. Install Crave
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          sudo mv crave /usr/local/bin/

          # 2. Direct Config Write
          # This ensures the config is exactly where the tool expects it
          mkdir -p ~/.config/crave
          echo '{"crave_username": "${{ secrets.CRAVE_USERNAME }}", "crave_token": "${{ secrets.CRAVE_TOKEN }}", "crave_host": "https://foss.crave.io"}' > ~/.config/crave/crave.conf
          
          # 3. Fire the runner using the --project flag (Highest Priority)
          # This bypasses the URL auto-discovery entirely
          crave run --project "LOS 22.1" --no-patch -- " \
            rm -rf actions-runner || true && \
            mkdir actions-runner && \
            cd actions-runner && \
            curl -o actions-runner-linux-x64-2.333.0.tar.gz -L https://github.com/actions/runner/releases/download/v2.333.0/actions-runner-linux-x64-2.333.0.tar.gz && \
            tar xzf ./actions-runner-linux-x64-2.333.0.tar.gz && \
            ./config.sh --unattended --url https://github.com/${{ github.repository }} --token ${{ github.event.inputs.RUNNER_TOKEN }} --replace && \
            ./run.sh \
          "
