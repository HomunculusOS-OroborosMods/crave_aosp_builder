name: Create Selfhosted Runner

on:
  workflow_dispatch:
    inputs:
      RUNNER_TOKEN:
        description: 'This is the runner token, not PAT'
        required: true

jobs:
  setup-and-run:
    runs-on: ubuntu-latest
    # We are forcing the credentials into the environment for the entire job
    env:
      CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
      CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}
      CRAVE_HOST: foss.crave.io
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Full Runner Setup
        run: |
          # 1. Install Crave
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          sudo mv crave /usr/local/bin/

          # 2. Setup Credentials in TWO places to be safe
          mkdir -p ~/.config/crave
          cat <<EOF > ~/.config/crave/crave.conf
          {
            "crave_username": "$CRAVE_USERNAME",
            "crave_token": "$CRAVE_TOKEN",
            "crave_host": "https://foss.crave.io"
          }
          EOF
          cp ~/.config/crave/crave.conf ~/crave.conf

          # 3. Create crave.yaml mapping
          # We'll try the project name exactly as it appears on your dashboard
          cat <<EOF > crave.yaml
          project: "LOS 22.1"
          EOF

          # 4. VERIFICATION: Test the connection before we try to run
          echo "Testing API connection..."
          crave list projects || echo "LIST FAILED: Check your CRAVE_TOKEN in GitHub Secrets!"

          # 5. Fire the runner setup
          # We use the -p flag to force the project name one more time
          crave run -p "LOS 22.1" --no-patch -- " \
            rm -rf actions-runner || true && \
            mkdir actions-runner && \
            cd actions-runner && \
            curl -o actions-runner-linux-x64-2.333.0.tar.gz -L https://github.com/actions/runner/releases/download/v2.333.0/actions-runner-linux-x64-2.333.0.tar.gz && \
            tar xzf ./actions-runner-linux-x64-2.333.0.tar.gz && \
            ./config.sh --unattended --url https://github.com/${{ github.repository }} --token ${{ github.event.inputs.RUNNER_TOKEN }} --replace && \
            ./run.sh \
          "
