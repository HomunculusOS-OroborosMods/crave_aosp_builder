name: Create Selfhosted Runner

on:
  workflow_dispatch:
    inputs:
      RUNNER_TOKEN:
        description: 'This is the runner token, not PAT'
        required: true

jobs:
  diagnose-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and Diagnose
        run: |
          # 1. Use absolute path /home/runner to bypass the HOME override
          mkdir -p /home/runner/.config/crave
          cat <<EOF > /home/runner/crave.conf
          {
            "crave_username": "${{ secrets.CRAVE_USERNAME }}",
            "crave_token": "${{ secrets.CRAVE_TOKEN }}",
            "crave_host": "foss.crave.io",
            "username": "${{ secrets.CRAVE_USERNAME }}",
            "token": "${{ secrets.CRAVE_TOKEN }}",
            "host": "foss.crave.io"
          }
          EOF
          cp /home/runner/crave.conf /home/runner/.config/crave/crave.conf
          
          # 2. Re-install Crave
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          sudo mv crave /usr/local/bin/
          
          # 3. Test raw connectivity to the FOSS server
          echo "--- CONNECTIVITY TEST ---"
          curl -I https://foss.crave.io
          
          # 4. Try to list projects using the explicit host config
          echo "--- AVAILABLE PROJECTS ---"
          crave list projects || echo "List projects failed."

      - name: Final Runner Attempt
        run: |
          # We'll try the project name 'lineage' which is the default for many FOSS accounts
          cat <<EOF > crave.yaml
          project: lineage
          EOF
          
          crave run --no-patch -- " \
            rm -rf actions-runner || true && \
            mkdir actions-runner && \
            cd actions-runner && \
            curl -o actions-runner-linux-x64-2.333.0.tar.gz -L https://github.com/actions/runner/releases/download/v2.333.0/actions-runner-linux-x64-2.333.0.tar.gz && \
            tar xzf ./actions-runner-linux-x64-2.333.0.tar.gz && \
            ./config.sh --unattended --url https://github.com/${{ github.repository }} --token ${{ github.event.inputs.RUNNER_TOKEN }} --replace && \
            ./run.sh \
          "
