name: Create Selfhosted Runner

on:
  workflow_dispatch:
    inputs:
      RUNNER_TOKEN:
        description: 'This is the runner token, not PAT'
        required: true

jobs:
  diagnose-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and Diagnose
        run: |
          # 1. Setup credentials with the FOSS host
          cat <<EOF > ~/crave.conf
          {
            "crave_username": "${{ secrets.CRAVE_USERNAME }}",
            "crave_token": "${{ secrets.CRAVE_TOKEN }}",
            "crave_host": "https://foss.crave.io"
          }
          EOF
          
          # 2. Install the Crave tool
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          sudo mv crave /usr/local/bin/
          
          # 3. DIAGNOSTIC: List all projects available to your account
          echo "--- AVAILABLE PROJECTS ---"
          crave list projects
          echo "--------------------------"

      - name: Attempt Runner
        run: |
          # We'll try project "lineage" as it's a common catch-all on FOSS
          cat <<EOF > crave.yaml
          project: lineage
          EOF
          
          crave run --no-patch -- " \
            rm -rf actions-runner || true && \
            mkdir actions-runner && \
            cd actions-runner && \
            curl -o actions-runner-linux-x64-2.333.0.tar.gz -L https://github.com/actions/runner/releases/download/v2.333.0/actions-runner-linux-x64-2.333.0.tar.gz && \
            tar xzf ./actions-runner-linux-x64-2.333.0.tar.gz && \
            ./config.sh --unattended --url https://github.com/${{ github.repository }} --token ${{ github.event.inputs.RUNNER_TOKEN }} --replace && \
            ./run.sh \
          "
