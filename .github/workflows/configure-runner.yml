name: Create Selfhosted Runner

on:
  workflow_dispatch:
    inputs:
      RUNNER_TOKEN:
        description: 'This is the runner token, not PAT'
        required: true

jobs:
  setup-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Full Runner Setup
        run: |
          # 1. Install Crave
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          sudo mv crave /usr/local/bin/

          # 2. Official API Configuration
          # We use the direct API host for FOSS to avoid the 301 redirect loop
          crave config set host foss.crave.io
          crave config set username "${{ secrets.CRAVE_USERNAME }}"
          crave config set token "${{ secrets.CRAVE_TOKEN }}"

          # 3. Create the mapping file
          # Locked to your active dashboard project
          cat <<EOF > crave.yaml
          project: "LOS 22.1"
          EOF

          # 4. Verification
          echo "Testing API handshake..."
          crave list projects || echo "Handshake failed. Double-check your CRAVE_TOKEN!"

          # 5. Fire the runner setup
          crave run --no-patch -- " \
            rm -rf actions-runner || true && \
            mkdir actions-runner && \
            cd actions-runner && \
            curl -o actions-runner-linux-x64-2.333.0.tar.gz -L https://github.com/actions/runner/releases/download/v2.333.0/actions-runner-linux-x64-2.333.0.tar.gz && \
            tar xzf ./actions-runner-linux-x64-2.333.0.tar.gz && \
            ./config.sh --unattended --url https://github.com/${{ github.repository }} --token ${{ github.event.inputs.RUNNER_TOKEN }} --replace && \
            ./run.sh \
          "
